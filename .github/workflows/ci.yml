name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck-build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        env:
          # RainbowKit requires a non-empty projectId even to statically
          # generate pages (see docs/adr — Milestone 0 finding); .env.local
          # is gitignored and never reaches CI, so this must be injected
          # here. Not a secret — NEXT_PUBLIC_* vars are bundled into the
          # client JS regardless of where they're set. Using a real
          # project ID here (as a repo variable, not hardcoded) would also
          # make WalletConnect actually functional in this build, but
          # isn't required just to unblock compilation.
          NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ${{ vars.NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID || '00000000000000000000000000000000' }}
        run: pnpm build

      # Runs each app's own "test" script via turbo. apps/backend's script
      # includes `--coverage`, so this also enforces the per-layer
      # coverageThreshold in apps/backend/package.json (see
      # docs/10-testing-strategy.md §3.1) — a coverage regression fails
      # this step, not just a failing test.
      - name: Test (incl. coverage thresholds)
        run: pnpm test

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: apps/*/coverage
          retention-days: 14
