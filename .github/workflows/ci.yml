name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck-build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      # Runs each app's own "test" script via turbo. apps/backend's script
      # includes `--coverage`, so this also enforces the per-layer
      # coverageThreshold in apps/backend/package.json (see
      # docs/10-testing-strategy.md §3.1) — a coverage regression fails
      # this step, not just a failing test.
      - name: Test (incl. coverage thresholds)
        run: pnpm test

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: apps/*/coverage
          retention-days: 14
